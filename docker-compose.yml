services:
  db:
    image: mysql:8.0
    container_name: myuzima-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:?Required}
      MYSQL_DATABASE: ${DB_NAME:?Required}
      MYSQL_USER: ${DB_USER:?Required}
      MYSQL_PASSWORD: ${DB_PASSWORD:?Required}
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - myuzima-network

  client:
    build:
      context: .
      dockerfile: Dockerfile.client
    container_name: myuzima-client
    restart: "no"
    volumes:
      - frontend_assets:/usr/share/nginx/html
    networks:
      - myuzima-network

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: myuzima-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_HOST: db
      DB_NAME: ${DB_NAME:?Required}
      DB_USER: ${DB_USER:?Required}
      DB_PASSWORD: ${DB_PASSWORD:?Required}
      DB_PORT: 3306
      JWT_SECRET: ${JWT_SECRET:?Required}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:?Required}
      VITE_APP_ID: ${VITE_APP_ID:?Required}
      OAUTH_SERVER_URL: ${OAUTH_SERVER_URL:?Required}
      OWNER_OPEN_ID: ${OWNER_OPEN_ID:?Required}
      OWNER_NAME: ${OWNER_NAME:?Required}
      BUILT_IN_FORGE_API_URL: ${BUILT_IN_FORGE_API_URL:?Required}
      BUILT_IN_FORGE_API_KEY: ${BUILT_IN_FORGE_API_KEY:?Required}
      VITE_FRONTEND_FORGE_API_URL: ${VITE_FRONTEND_FORGE_API_URL:?Required}
      VITE_FRONTEND_FORGE_API_KEY: ${VITE_FRONTEND_FORGE_API_KEY:?Required}
    volumes:
      - frontend_assets:/app/dist/public:ro 
    # NOTE: Healthcheck is inherited from Dockerfile.api
    networks:
      - myuzima-network

  nginx:
    image: nginx:alpine
    container_name: myuzima-nginx
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
      - nginx_cache:/var/cache/nginx
      - frontend_assets:/usr/share/nginx/html:ro
    networks:
      - myuzima-network

volumes:
  db_data:
  nginx_cache:
  frontend_assets:

networks:
  myuzima-network:
    driver: bridge
