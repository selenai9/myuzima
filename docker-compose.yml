services:
  # MySQL Database - ISOLATED from public access
  db:
    image: mysql:8.0
    container_name: myuzima-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:?DB_ROOT_PASSWORD is required}
      MYSQL_DATABASE: ${DB_NAME:?DB_NAME is required}
      MYSQL_USER: ${DB_USER:?DB_USER is required}
      MYSQL_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - myuzima-network

  # Client (PWA) Build Service
  client:
    build:
      context: .
      dockerfile: Dockerfile.client
    container_name: myuzima-client
    restart: "no" # This likely builds assets then stops; 'no' prevents reboot loops
    volumes:
      - frontend_assets:/usr/share/nginx/html
    networks:
      - myuzima-network

  # API Server - Internal Only
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: myuzima-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_HOST: db
      DB_NAME: ${DB_NAME:?Required}
      DB_USER: ${DB_USER:?Required}
      DB_PASSWORD: ${DB_PASSWORD:?Required}
      DB_PORT: 3306
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:?ENCRYPTION_KEY is required}
      VITE_APP_ID: ${VITE_APP_ID:?VITE_APP_ID is required}
      OAUTH_SERVER_URL: ${OAUTH_SERVER_URL:?OAUTH_SERVER_URL is required}
      OWNER_OPEN_ID: ${OWNER_OPEN_ID:?OWNER_OPEN_ID is required}
      OWNER_NAME: ${OWNER_NAME:?OWNER_NAME is required}
      BUILT_IN_FORGE_API_URL: ${BUILT_IN_FORGE_API_URL:?Required}
      BUILT_IN_FORGE_API_KEY: ${BUILT_IN_FORGE_API_KEY:?Required}
      VITE_FRONTEND_FORGE_API_URL: ${VITE_FRONTEND_FORGE_API_URL:?Required}
      VITE_FRONTEND_FORGE_API_KEY: ${VITE_FRONTEND_FORGE_API_KEY:?Required}
    volumes:
      - frontend_assets:/app/dist/public:ro 
    healthcheck:
      # wget is more common than curl in slim/alpine images
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    networks:
      - myuzima-network

  # Nginx Reverse Proxy - The ONLY Public Entry Point
  nginx:
    image: nginx:alpine
    container_name: myuzima-nginx
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
      - nginx_cache:/var/cache/nginx
      - frontend_assets:/usr/share/nginx/html:ro
    networks:
      - myuzima-network

volumes:
  db_data:
  nginx_cache:
  frontend_assets:

networks:
  myuzima-network:
    driver: bridge
