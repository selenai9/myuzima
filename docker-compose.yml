services:
  db:
    image: mysql:8.0
    container_name: myuzima-db
    restart: unless-stopped
    env_file: .env
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:?Required}
      MYSQL_DATABASE: ${DB_NAME:?Required}
      MYSQL_USER: ${DB_USER:?Required}
      MYSQL_PASSWORD: ${DB_PASSWORD:?Required}
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - myuzima-network

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: myuzima-api
    restart: unless-stopped
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_HOST: db
      DB_NAME: ${DB_NAME:?Required}
      DB_USER: ${DB_USER:?Required}
      DB_PASSWORD: ${DB_PASSWORD:?Required}
      
      # Security & API Secrets
      JWT_SECRET: ${JWT_SECRET:?Required}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:?Required}
      
      # OAuth
      VITE_APP_ID: ${VITE_APP_ID:?Required}
      OAUTH_SERVER_URL: ${OAUTH_SERVER_URL:?Required}
      OWNER_OPEN_ID: ${OWNER_OPEN_ID:?Required}
      OWNER_NAME: ${OWNER_NAME:?Required}
      
      # Forge API - Mapped securely
      # These will stay inside the 'api' container and won't go to the browser
      BUILT_IN_FORGE_API_URL: ${FORGE_API_URL:?Required}
      BUILT_IN_FORGE_API_KEY: ${FORGE_API_KEY:?Required}
      FRONTEND_FORGE_API_URL: ${FRONTEND_FORGE_API_URL:?Required}
      FRONTEND_FORGE_API_KEY: ${FRONTEND_FORGE_API_KEY:?Required}
    networks:
      - myuzima-network

  nginx:
    # ... (remains the same as your previous script)
